---
name: Continuous Integration

on:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "LICENSE"
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "LICENSE"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fast-checks:
    name: 🏁 Fast Checks (Format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust toolchain (pinned via rust-toolchain)
        run: |
          rustup show active-toolchain || rustup show
          rustup component add rustfmt --toolchain nightly
      - name: Install taplo
        run: cargo install taplo-cli --locked
      - name: Run format checks
        run: |
          taplo format --check --config taplo.toml
          cargo +nightly fmt --all -- --check

  build-and-test-matrix:
    name: 🛠️ Build & Test Matrix
    needs: fast-checks
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -yqq
          sudo apt-get install -yqq --no-install-recommends \
            libclang-dev \
            protobuf-compiler
      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install protobuf
      - name: Setup Rust toolchain (pinned via rust-toolchain)
        run: |
          rustup show active-toolchain || rustup show
          rustc --version
          cargo --version
      - name: Build
        run: cargo build --locked --release
      - name: Test
        run: cargo test --locked --release

  analysis:
    name: 🤖 Analysis (Clippy & Doc)
    needs: fast-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update -yqq
          sudo apt-get install -yqq --no-install-recommends \
            libclang-dev \
            protobuf-compiler
      - name: Setup Rust toolchain (pinned via rust-toolchain)
        run: |
          rustup show active-toolchain || rustup show
          rustup component add rust-src clippy
          rustc --version
          cargo --version
      - name: Run clippy
        run: cargo clippy --locked -- -D warnings
      - name: Run doc
        run: cargo doc --locked --no-deps

  security-audit:
    name: 🔐 Security Audit (non-blocking)
    needs: fast-checks
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust toolchain (pinned via rust-toolchain)
        run: |
          rustup show active-toolchain || rustup show
          rustc --version
          cargo --version
      - name: Cache cargo-audit binary
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-bin-${{ runner.os }}
      - name: Cache RustSec advisory database
        uses: actions/cache@v4
        with:
          path: ~/.cargo/advisory-db
          key: cargo-advisory-db-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            cargo-advisory-db-${{ runner.os }}-
      - name: Install cargo-audit
        run: |
          if ! command -v cargo-audit >/dev/null 2>&1; then
            cargo install cargo-audit --locked
          fi
      - name: Run cargo audit (informational only)
        run: cargo audit
